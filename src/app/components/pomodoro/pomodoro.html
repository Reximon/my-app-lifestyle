<section class="pomodoro" [class.break-mode]="isBreak">
  <div class="timer">{{ minutes }}:{{ seconds < 10 ? '0' + seconds : seconds }}</div>
  <div class="status">{{ isBreak ? 'Descanso' : 'Trabajo' }}</div>
  <div class="controls">
    <button (click)="toggle()"><fa-icon [icon]="['fas', isRunning ? 'pause' : 'play']"></fa-icon> {{ isRunning ? 'Pausa' : 'Inicio' }}</button>
    <button (click)="reset()"><fa-icon [icon]="['fas', 'rotate']"></fa-icon> Reset</button>
  </div>
</section>
