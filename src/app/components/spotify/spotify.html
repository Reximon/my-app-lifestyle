<section class="spotify">
  @if (activeEmbedUrl) {
    <iframe
      class="spotify-embed"
      [src]="activeEmbedUrl"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"
      title="Reproductor Spotify"
    ></iframe>
  }

  <div class="playlist-list">
    <div class="list-title">Tus listas</div>
    @for (p of playlists; track p.id; let i = $index) {
      <div
        class="playlist-item"
        [class.active]="i === activeIndex"
        (click)="select(i)"
      >
        <span class="index">{{ i + 1 }}</span>
        <fa-icon [icon]="['fas', 'music']" class="item-icon"></fa-icon>
        <span class="label">{{ p.label }}</span>
        <div class="actions">
          <button
            class="play-btn"
            (click)="select(i); $event.stopPropagation();"
            title="Reproducir"
          >
            <fa-icon [icon]="['fas', 'play']"></fa-icon>
          </button>
          <button
            class="remove-btn"
            (click)="remove(i); $event.stopPropagation();"
            title="Quitar"
          >
            <fa-icon [icon]="['fas', 'xmark']"></fa-icon>
          </button>
        </div>
      </div>
    }
  </div>

  <button class="add-btn" (click)="openModal()">
    <fa-icon [icon]="['fas', 'plus']"></fa-icon>
    Añadir playlist
  </button>
</section>

@if (showModal) {
  <div class="modal-backdrop" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <fa-icon [icon]="['fab', 'spotify']"></fa-icon>
        <span>Añadir playlist</span>
        <button class="modal-close" (click)="closeModal()">
          <fa-icon [icon]="['fas', 'xmark']"></fa-icon>
        </button>
      </div>

      <div class="modal-body">
        <label>
          URL de Spotify
          <input
            [(ngModel)]="inputUrl"
            (keyup.enter)="addPlaylist()"
            placeholder="https://open.spotify.com/playlist/..."
          >
        </label>
        <label>
          Nombre (opcional)
          <input
            [(ngModel)]="inputLabel"
            placeholder="Mi playlist"
          >
        </label>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeModal()">Cancelar</button>
        <button class="btn-save" (click)="addPlaylist()" [disabled]="!inputUrl.trim()">
          <fa-icon [icon]="['fas', 'plus']"></fa-icon>
          Añadir
        </button>
      </div>
    </div>
  </div>
}
