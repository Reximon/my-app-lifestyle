<div class="banner">
  <img class="banner-bg" src="img/bg.jpg" alt="REXI OS">
  <div class="banner-overlay"></div>
  <div class="banner-content">
    <div class="banner-left">
      <fa-icon [icon]="['fas', 'mosquito']" class="mosquito"></fa-icon>
      <div class="banner-brand">
        <span class="brand-name">REXI OS</span>
        <span class="brand-sub">puesto de mando académico</span>
      </div>
    </div>
    <div class="banner-right">
      <div class="banner-info">
        <span class="greeting">{{ greeting() }}, <strong>Rexi</strong></span>
        <span class="current-date">{{ dateStr() }}</span>
      </div>
      <app-global-search></app-global-search>
      <div class="banner-stats">
        <div class="stat-card">
          <span class="stat-value">{{ pendingCount() }}</span>
          <span class="stat-label">pendientes</span>
        </div>
        <div class="stat-card">
          <span class="stat-value">{{ objDone() }}/{{ objTotal() }}</span>
          <span class="stat-label">objetivos hoy</span>
        </div>
      </div>
    </div>
  </div>
</div>

<main class="main">
  <div class="app-layout">
  <aside class="sidebar-left">
    <app-clock></app-clock>
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'plus']"> </fa-icon>
      Agregar tareas
    </div>
    <app-actions-panel></app-actions-panel>
    <app-spotify></app-spotify>
  </aside>

  <main class="main-content">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'image']"> </fa-icon>
      Diagramas
    </div>
    <app-diagram-gallery></app-diagram-gallery>
    <hr class="section-divider">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'list-check']"> </fa-icon>
      Tareas de la semana
    </div>
    <app-todo-week></app-todo-week>
    <hr class="section-divider">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'bullseye']"> </fa-icon>
      Objetivos
    </div>
    <app-objectives></app-objectives>
    <hr class="section-divider">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'check']"> </fa-icon>
      Proyectos
    </div>
    <app-assignments></app-assignments>
    <hr class="section-divider">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'book-open']"> </fa-icon>
      Notas de clase
    </div>
    <app-class-notes></app-class-notes>
    <hr class="section-divider">
    <div class="title-section-block">
      <fa-icon [icon]="['fas', 'calendar']"> </fa-icon>
      Calendario
    </div>
    <app-calendar-view></app-calendar-view>
  </main>

  <aside class="sidebar-right">
    <app-topics-list></app-topics-list>
    <app-pomodoro></app-pomodoro>
  </aside>
</div>
</main>

<router-outlet />
